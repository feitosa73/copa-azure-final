name: Deploy Frontend (FIFA 2026 Web)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  WORKING_DIR: fifa2026-web
  NODE_VERSION: 18

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    #environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

    - name: Install dependencies
      run: npm ci --omit=dev
      working-directory: ${{ env.WORKING_DIR }}

    - name: Build frontend
      run: npm run build
      working-directory: ${{ env.WORKING_DIR }}
      env:
        VITE_API_URL: https://${{ vars.BACKEND_APP_NAME }}.azurewebsites.net/api
        BACKEND_URL: https://${{ vars.BACKEND_APP_NAME }}.azurewebsites.net

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.FRONTEND_APP_NAME }}
        package: ${{ env.WORKING_DIR }}/dist
        slot-name: production
